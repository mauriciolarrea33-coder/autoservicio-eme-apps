!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Autoservicio EME</title>

<style>
body{

background:#f2f2f2;

}

header{
background:#d90000;
color:white;
padding:20px;

}

.producto{
background:white;
margin:20px;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
background:#25D366;

}

<body>

<header>
Autoservicio EME
</header>

<div class="producto">
<h2>Empanadas</h2>
<p>Docena $9000</p>
<button onclick="pedir('Empanadas')">Pedir por WhatsApp</button>
</div>

<div class="producto">
<h2>Pizzas</h2>
<p>$8000</p>
<button onclick="pedir('Pizza')">Pedir por WhatsApp</button>
</div>

<div class="producto">
<h2>Milanesas</h2>
<p>$7500</p>
<button onclick="pedir('Milanesas')">Pedir por WhatsApp</button>
</div>

<script>

function pedir(producto){

var telefono="5492281655755"

var mensaje="Hola quiero pedir "+producto+" de Autoservicio EME"

var url="https://wa.me/"+telefono+"?text="+encodeURIComponent(mensaje)

window.open(url)

}

</script>
