!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Autoservicio EME</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#d90000;
color:white;
text-align:center;
padding:20px;
}

.logo{
width:120px;
margin-bottom:10px;
}

.titulo{
font-size:28px;
font-weight:bold;
}

.productos{
padding:15px;
}

.producto{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.producto h2{
margin:0;
}

.precio{
font-size:18px;
margin:8px 0;
}

button{
background:#25D366;
color:white;
border:none;
padding:12px;
border-radius:8px;
width:100%;
font-size:16px;
}

</style>

</head>

<body>

<header>

<img class="logo" src=file_000000001d64720ebf4d12b956f1f65c.png

<div class="titulo">Autoservicio EME</div>

</header>

<div class="productos">

<div class="producto">
<h2>Empanadas</h2>
<div class="precio">Docena $9000</div>
<button onclick="pedir('Empanadas docena')">Pedir por WhatsApp</button>
</div>

<div class="producto">
<h2>Pizza muzzarella</h2>
<div class="precio">$8000</div>
<button onclick="pedir('Pizza muzzarella')">Pedir por WhatsApp</button>
</div>

<div class="producto">
<h2>Milanesas con papas</h2>
<div class="precio">$9500</div>
<button onclick="pedir('Milanesas con papas')">Pedir por WhatsApp</button>
</div>

<div class="producto">
<h2>Hamburguesa completa</h2>
<div class="precio">$7500</div>
<button onclick="pedir('Hamburguesa completa')">Pedir por WhatsApp</button>
</div>

<div class="producto">
<h2>Menú del día</h2>
<div class="precio">$7000</div>
<button onclick="pedir('Menu del dia')">Pedir por WhatsApp</button>
</div>

</div>

<script>

function pedir(producto){

var telefono="5492281655755"

var mensaje="Hola quiero pedir "+producto+" de Autoservicio EME"

var url="https://wa.me/"+telefono+"?text="+encodeURIComponent(mensaje)

window.open(url)

}

</script>

</body>
</html>
